name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: |
          go test ./...
          go vet ./...

      - name: Build artifacts
        run: scripts/build-release-artifacts.sh "${{ steps.version.outputs.tag }}" dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not set; skipping tap update."
            exit 0
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/KalebKE/homebrew-tap.git" tap
          mkdir -p tap/Formula
          scripts/render-homebrew-formula.sh "$TAG" dist/checksums.txt > tap/Formula/roboranch.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/roboranch.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "Update roboranch to ${TAG}"
          git push

